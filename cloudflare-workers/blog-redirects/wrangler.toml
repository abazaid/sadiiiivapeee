name = "blog-redirects"
main = "worker.js"
compatibility_date = "2026-04-23"

routes = [
  # /blog-vape/ redirect to Arabic blog
  { pattern = "saudivapes.com/blog-vape", zone_name = "saudivapes.com" },
  { pattern = "saudivapes.com/blog-vape/*", zone_name = "saudivapes.com" },
  { pattern = "saudivapes.com/ar/blog-vape", zone_name = "saudivapes.com" },
  { pattern = "saudivapes.com/ar/blog-vape/*", zone_name = "saudivapes.com" },
  # Exact match for /ar/blog (redirects to /ar/blog/ for clean URL)
  { pattern = "saudivapes.com/ar/blog", zone_name = "saudivapes.com" },
  # Catch all /ar/blog/* traffic — more specific than the catch-all /ar* route,
  # so this Worker takes priority. Proxies to Astro Pages deployment.
  { pattern = "saudivapes.com/ar/blog/*", zone_name = "saudivapes.com" },
  # Sitemap generated by Astro
  { pattern = "saudivapes.com/sitemap-index.xml", zone_name = "saudivapes.com" },
  { pattern = "saudivapes.com/sitemap-0.xml", zone_name = "saudivapes.com" },
  # Admin panel (Decap CMS) + CMS OAuth — under /ar/ to avoid Salla root-level conflicts
  { pattern = "saudivapes.com/ar/admin", zone_name = "saudivapes.com" },
  { pattern = "saudivapes.com/ar/admin/*", zone_name = "saudivapes.com" },
]
